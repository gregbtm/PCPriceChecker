name: PC Price MCP — CI / Publish

on:
  push:
    branches:
      - main
      - claude/uk-pc-component-mcp-h39nb7
    paths:
      - 'pc-price-mcp/**'
      - '.github/workflows/pc-price-mcp.yml'
  pull_request:
    paths:
      - 'pc-price-mcp/**'

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pc-price-mcp

jobs:
  build:
    name: TypeScript build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pc-price-mcp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pc-price-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/claude/uk-pc-component-mcp-h39nb7' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./pc-price-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
