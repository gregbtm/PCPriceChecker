name: PC Price MCP — CI

on:
  push:
    paths:
      - 'pc-price-mcp/**'
      - '.github/workflows/pc-price-mcp.yml'
  pull_request:
    paths:
      - 'pc-price-mcp/**'

jobs:
  build:
    name: TypeScript build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pc-price-mcp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pc-price-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build
    # Only build image on push to the main deployment branch
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./pc-price-mcp
          push: false       # flip to true + add login step to push to GHCR
          tags: ghcr.io/${{ github.repository_owner }}/pc-price-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
